<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dr Croissant | Signature Hosted</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    table {
      border-collapse: collapse;
      border-spacing: 0;
    }

    img {
      display: block;
      border: 0;
      outline: none;
      text-decoration: none;
    }

    .wrap {
      width: 100%;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
      background: #f8f4ee;
    }

    .card {
      width: min(100%, 1086px);
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #eedfcc;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(82, 55, 34, .1);
    }

    @media (max-width: 1120px) {
      .wrap { padding: 10px; }
      .card { border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="width:100%; max-width:1086px; margin:0 auto;">
        <tr>
          <td colspan="4" style="padding:0; line-height:0; font-size:0;">
            <img src="assets/sig_top.png" width="1086" alt="" style="width:100%; max-width:1086px; height:auto;">
          </td>
        </tr>
        <tr>
          <td style="padding:0; line-height:0; font-size:0; width:47.88%;">
            <img src="assets/sig_mid_left.png" width="520" alt="" style="width:100%; height:auto;">
          </td>
          <td style="padding:0; line-height:0; font-size:0; width:18.28%;">
            <a href="mailto:contact@drcroissant.lu" style="display:block; line-height:0; font-size:0;">
              <img src="assets/sig_mid_email.png" width="198.5" alt="contact@drcroissant.lu" style="width:100%; height:auto;">
            </a>
          </td>
          <td style="padding:0; line-height:0; font-size:0; width:16.90%;">
            <a href="tel:+352691989880" style="display:block; line-height:0; font-size:0;">
              <img src="assets/sig_mid_phone.png" width="183.5" alt="+352 691 989 880" style="width:100%; height:auto;">
            </a>
          </td>
          <td style="padding:0; line-height:0; font-size:0; width:16.94%;">
            <a href="https://www.instagram.com/drcroissant.lu" style="display:block; line-height:0; font-size:0;">
              <img src="assets/sig_mid_insta.png" width="184" alt="@drcroissant.lu" style="width:100%; height:auto;">
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0; line-height:0; font-size:0; width:47.19%;">
            <img src="assets/sig_addr_left.png" width="512.5" alt="" style="width:100%; height:auto;">
          </td>
          <td colspan="3" style="padding:0; line-height:0; font-size:0; width:52.81%;">
            <a href="https://maps.app.goo.gl/7bdZCnMsCG1K61aKA" style="display:block; line-height:0; font-size:0;">
              <img src="assets/sig_addr_map.png" width="573.5" alt="Belval Plaza, 14 Avenue du Rock'n'Roll, L-4361 Esch-sur-Alzette, Luxembourg" style="width:100%; height:auto;">
            </a>
          </td>
        </tr>
        <tr>
          <td colspan="4" style="padding:0; line-height:0; font-size:0;">
            <img src="assets/sig_bottom.png" width="1086" alt="" style="width:100%; max-width:1086px; height:auto;">
          </td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
